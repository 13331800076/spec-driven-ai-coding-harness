apis:
  - name: delete_attachment
    method: DELETE
    path: /api/attachments/{attachment_id}
    permission_required: ATTACHMENT_DELETE
    request_schema:
      attachment_id: string
      data: object
      file: binary
    response_schema:
      status: string
      message: string
    error_codes:
      - 400
      - 401
      - 403
      - 500
  - name: delete_attachment_operation
    method: DELETE
    path: /api/attachment_operations/{attachment_operation_id}
    permission_required: ATTACHMENT_OPERATION_DELETE
    request_schema:
      attachment_operation_id: string
      data: object
      file: binary
    response_schema:
      status: string
      message: string
    error_codes:
      - 400
      - 401
      - 403
      - 500
